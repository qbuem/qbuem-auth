name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Build the header-only library's network-independent unit tests and run them,
# both in a normal build and under AddressSanitizer + UndefinedBehaviorSanitizer.
# qbuem-stack is pulled via FetchContent and uses C++23 <expected>, so the build
# uses GCC 13 (ubuntu-24.04 default) — clang+libstdc++ on the runner lacks it.
# liburing-dev + libssl-dev are the only system dependencies.
jobs:
  test:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: "GCC 13",            flags: "" }
          - { label: "GCC 13 · ASan+UBSan", flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -g" }
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y liburing-dev libssl-dev

      - name: Configure
        run: >
          cmake -B build
          -DQBUEM_AUTH_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_CXX_FLAGS="${{ matrix.flags }}"

      - name: Build
        run: cmake --build build -j3

      - name: Test
        working-directory: build
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1:abort_on_error=1
        run: ctest --output-on-failure
