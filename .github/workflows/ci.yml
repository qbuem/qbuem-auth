name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Build the header-only library's network-independent unit tests and run them,
# both in a normal Release build and under AddressSanitizer + UndefinedBehavior
# Sanitizer.  qbuem-stack is pulled via FetchContent; OpenSSL is the only system
# dependency.
jobs:
  test:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: "Release · Clang 18",   flags: "-O2" }
          - { label: "ASan+UBSan · Clang 18", flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -g" }
    steps:
      - uses: actions/checkout@v6

      - name: Install Clang 18 + OpenSSL
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s 18
          sudo apt-get install -y libssl-dev

      - name: Configure
        run: >
          cmake -B build
          -DQBUEM_AUTH_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=clang++-18
          -DCMAKE_CXX_FLAGS="${{ matrix.flags }}"

      - name: Build
        run: cmake --build build -j3

      - name: Test
        working-directory: build
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1:abort_on_error=1
        run: ctest --output-on-failure
